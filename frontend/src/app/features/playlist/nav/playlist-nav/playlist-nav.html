<div>
  <nav>
    <ul>
      @for (playlist of playlists; track playlist.slug){
        <li>
          <a [routerLink]="['/playlist', playlist.slug]"
             routerLinkActive
             #rla='routerLinkActive'
             class="navig">
            <svg xmlns="http://www.w3.org/2000/svg"
                 width="60"
                 height="60"
                 viewBox="0 0 24 24"
                 [attr.fill]="rla.isActive ? '#35a78a' :
'none'"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round"
                 class="lucide lucide-folder-icon lucide-folder"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
            </svg>
            <div class="nav-element">{{playlist.name}}</div>
          </a>
        </li>
      }
    </ul>
  </nav>
</div>
